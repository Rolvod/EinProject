<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container">
  <header class="d-flex flex-wrap justify-content-center py-3 mb-4 border-bottom">

    <a href="{% url 'home' %}" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto link-body-emphasis text-decoration-none">
      <span class="fs-4 fw-bold">EinQuiz</span>
    </a>

    <ul class="nav nav-pills">
      <li class="nav-item"><a href="{% url 'home' %}" class="nav-link active" aria-current="page">Главная страница</a></li>
      {% if user.is_superuser %}
        <li class="nav-item"><a href="/admin/" class="nav-link">Админ панель</a></li>
      {% endif %}

      {% if user.is_authenticated %}
        <li class="nav-item"><a href="{% url 'current_profile' %}" class="nav-link">{{ user.username }}</a></li>
      {% else %}
        <li class="nav-item"><a href="{% url 'login' %}" class="nav-link">Войти</a></li>
      {% endif %}
      <li class="nav-item"><a href="#" class="nav-link">Новости</a></li>
      <li class="nav-item"><a href="#" class="nav-link">Тесты</a></li>
      <li class="nav-item"><a href="#" class="nav-link">Таблица лидеров</a></li>
    </ul>
  </header>
</div>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
