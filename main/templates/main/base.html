<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg bg-light border-bottom sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'home' %}">EinQuiz</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a href="{% url 'home' %}" class="nav-link">Главная</a></li>
                    <li class="nav-item"><a href="{% url 'quizzes' %}" class="nav-link">Тесты</a></li>
                    <li class="nav-item"><a href="{% url 'news' %}" class="nav-link">Новости</a></li>
                    <li class="nav-item"><a href="{% url 'leaderboard' %}" class="nav-link">Лидеры</a></li>
                    
                    {% if user.is_authenticated %}
                        <li class="nav-item"><a href="{% url 'current_profile' %}" class="nav-link">{{ user.username }}</a></li>
                        {% if user.is_superuser %}
                            <li class="nav-item"><a href="/admin/" class="nav-link text-danger">Админ панель</a></li>
                        {% endif %}
                    {% else %}
                        <li class="nav-item"><a href="{% url 'login' %}" class="nav-link">Войти</a></li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-4 flex-grow-1">
        {% block content %}{% endblock %}
    </main>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
