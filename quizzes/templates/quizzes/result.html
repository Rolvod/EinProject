{% extends 'main/base.html' %}

{% block title %}Результат{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow-sm border-success">
            <div class="card-body text-center p-5">
                <h1 class="display-5 fw-bold">{{ quiz.name }}</h1>
                <div class="display-3 fw-bold text-success my-4">{{ score }} / {{ quiz.questions.count }}</div>
                <p class="lead">{{ message }}</p>
                <hr class="my-4">
                <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
                    <a href="{% url 'quizzes' %}" class="btn btn-primary btn-lg px-4">К тестам</a>
                    <a href="{% url 'leaderboard' %}" class="btn btn-outline-secondary btn-lg px-4">Таблица лидеров</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
