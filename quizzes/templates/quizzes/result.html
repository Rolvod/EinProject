{% extends 'main/base.html' %}

{% block title %}Результат: {{ quiz.name }}{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="alert alert-success">
        <h1>Результат теста: {{ quiz.name }}</h1>
        <hr>
        <h3>Вы ответили правильно на {{ score }} вопросов!</h3>
        <p>{{ message }}</p>
    </div>

    <div class="mt-3">
        <a href="{% url 'quizzes' %}" class="btn btn-primary">Назад к тестам</a>
        <a href="/" class="btn btn-secondary">На главную</a>
    </div>
</div>
{% endblock %}
