{% extends 'main/base.html' %}

{% block title %}Вход{% endblock %}

{% block content %}
    <form method="post" style="max-width: 330px; margin: auto; padding: 1rem;">
  {% csrf_token %}
  <h1 class="h3 mb-3 fw-normal">Вход</h1>

  <div class="form-floating mb-3">
    <input name="username" type="text" class="form-control" id="floatingText" placeholder="Password">
    <label for="floatingText">Имя пользователя</label>
  </div>

  <div class="form-floating mb-3">
    <input name="password" type="password" class="form-control" id="floatingPassword" placeholder="Password">
    <label for="floatingPassword">Пароль</label>
  </div>

  
  {% if error %}
    <div class="text-danger">{{ error }}</div>
  {% endif %}
  <p> Нет аккаунта? <a href="{% url 'register' %}">Создайте ее!</a> </p>
  <button class="btn btn-primary w-100 py-2" type="submit">Войти</button>
</form>
<script src="/docs/5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" class="astro-vvvwv3sm"></script>
{% endblock %}
