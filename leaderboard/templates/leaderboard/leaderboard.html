{% extends 'main/base.html' %}

{% block title %}Таблица лидеров{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col">
        <h1 class="display-6 fw-bold">Таблица лидеров</h1>
    </div>
</div>

<div class="list-group shadow-sm">
    {% for leader in users %}
        <div class="list-group-item d-flex justify-content-between align-items-center py-3">
            <div>
                <span class="badge {% if forloop.counter == 1 %}bg-warning{% elif forloop.counter == 2 %}bg-secondary{% elif forloop.counter == 3 %}bg-warning bg-opacity-25{% else %}bg-light text-dark{% endif %} me-3 p-2">{{ forloop.counter }}</span>
                <a href="/profiles/{{ leader.username }}" class="fw-bold text-decoration-none">{{ leader.nickname }}</a>
            </div>
            <span class="badge bg-primary rounded-pill p-3">{{ leader.points }} очков</span>
        </div>
    {% empty %}
        <div class="alert alert-secondary text-center">Пока здесь никого нет. Будь первым!</div>
    {% endfor %}
</div>
{% endblock %}
