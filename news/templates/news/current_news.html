{% extends 'main/base.html' %}

{% block title %}{{ news.title }}{% endblock %}

{% block content %}
<div class="container mt-3">
    <div class="alert alert-primary">
        <h1 class="fw-bold">{{ news.title }}</h1>
        <small>Опубликовано: {{ news.date }}</small>
    </div>

    <div class="border p-3 rounded">
        <a href="{% url 'news' %}" class="btn btn-outline-secondary">Назад</a>
        {% if news.photo %}
            <div class="text-center mb-3">
                <img src="{{ news.photo }}" class="img-fluid rounded border" style="max-height: 300px;">
            </div>
        {% endif %}

        <div class="fs-5">
            {{ news.text|linebreaks }}
        </div>

        <hr>
    </div>
</div>
{% endblock %}
